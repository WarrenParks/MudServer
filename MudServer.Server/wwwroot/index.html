<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MUD Terminal</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <div id="container">
      <div id="sidebar">
        <h3>JSON Templates</h3>
        <ul id="template-list"></ul>
      </div>
      <div id="main">
        <div id="terminal" tabindex="0"></div>
        <div id="json-editor-container">
          <textarea id="json-editor" spellcheck="false"></textarea>
          <button id="send-json-btn">Send JSON</button>
        </div>
      </div>
    </div>
  </body>
</html>
